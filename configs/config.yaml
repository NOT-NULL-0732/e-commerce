app:
  name: "app"
  port: 443
  env: "dev"
  ssl: true
  ssl_crt_path: "./configs/certs/env-1.crt"
  ssl_key_path: "./configs/certs/env-1.key"

database:
  host: "postgres-dev"
  port: 5432
  user: "postgres"
  password: "postgres"
  db_name: "postgres"
  ssl_mode: disable
  max_idle_conns: 100
  max_open_conns: 100
  conn_max_lifetime: 10
  time_zone: "Asia/Shanghai"
  log_level: "error"

redis:
  host: "redis"
  port: 6379
  password:
  db: 0
  pool_size: 10

log:
  console_level: "debug"
  file_level: "debug"
  filename: "./logs/app.log"
  max_size: 100
  max_backups: 3
  max_age: 28

auth:
  access_token_expire: 15m
  refresh_token_expire: 168h
  token_secret: "12345678"

otel:
  enabled: true
  endpoint:
    trace_endpoint: "tempo:4317"
    metric_endpoint: "prometheus:9090"
  service_name: "e-commerce"