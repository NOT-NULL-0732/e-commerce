name: Build and Push
on: [push]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      GOPROXY: https://goproxy.cn,direct

    steps:
      - uses: https://gitea.internal:3000/actions/checkout@v3

      - name: Set up Go
        uses: https://gitea.internal:3000/actions/setup-go@v4
        with:
          go-version: '1.23'

      - name: Run Ginkgo Tests
        env:
          IMAGE_REPOSITORY: harbor.local/dockerhub/
        run: |
          go mod download
          go install github.com/onsi/ginkgo/v2/ginkgo
          APP_ENV=test APP_REGISTRY_PREFIX="${IMAGE_REPOSITORY}" APP_OTEL_ENABLED=false APP_LOG_CONSOLE_LEVEL=error APP_DATABASE_LOG_LEVEL=error CONFIG_PATH=../configs/config.yaml $(go env GOPATH)/bin/ginkgo -r --race --randomize-all

      - name: Build and Push Docker Image
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login harbor.local -u "${{ secrets.HARBOR_USER }}" --password-stdin
          SHORT_SHA=$(echo "${{ gitea.sha }}" | cut -c1-7)
          IMAGE_TAG=harbor.local/my-project/e-commerce:$SHORT_SHA
          
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG